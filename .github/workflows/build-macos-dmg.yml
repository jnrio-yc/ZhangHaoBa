name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "mac-v*"

jobs:
  build-macos:
    name: Build DMG (${{ matrix.label }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
          - label: Intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build DMG
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles dmg

      - name: Verify app signature
        shell: bash
        run: |
          APP_PATHS=(src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app)
          test -d "${APP_PATHS[0]}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATHS[0]}"
          codesign --display --verbose=2 "${APP_PATHS[0]}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: account-vault-macos-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
